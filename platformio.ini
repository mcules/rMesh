[env:SEEED_SenseCAP_Indicator]  ;https://wiki.seeedstudio.com/SenseCAP_Indicator_Get_Started/ (ESP32-S3R8, 480x480 RGB display)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
	jgromes/RadioLib@^7.4.0
	esp32async/ESPAsyncWebServer@^3.8.0
	bblanchon/ArduinoJson@^7.4.2
	lovyan03/LovyanGFX@^1.1.16
board_build.filesystem = littlefs
board_build.partitions = partitions_8MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DPIO_ENV_NAME=\"${PIOENV}\"
    -DSEEED_SENSECAP_INDICATOR
    -DCORE_DEBUG_LEVEL=4
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

[env:SEEED_XIAO_ESP32S3_Wio_SX1262]  ;https://wiki.seeedstudio.com/wio_sx1262_with_xiao_esp32s3_for_lora/ (ESP32-S3, SX1262 868 MHz)
