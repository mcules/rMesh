    -DHELTEC_WIRELESS_STICK_LITE_V3
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/HELTEC_Wireless_Stick_Lite_V3/hal_HELTEC_Wireless_Stick_Lite_V3.cpp>

[env:HELTEC_HT-Tracker_V1_2]  ;https://heltec.org/project/wireless-tracker/ (ESP32-S3 + SX1262 + ST7735 TFT)
extends = esp32_base
board = esp32-s3-devkitc-1
lib_deps =
    ${esp32_base.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
build_flags =
    ${esp32_base.build_flags}
    -DHELTEC_HT_TRACKER_V1_2
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/HELTEC_HT_Tracker_V1_2/hal_HELTEC_HT_Tracker_V1_2.cpp>
    +<display/display_ST7735_TFT.cpp>

[env:LILYGO_T-LoraPager]  ;https://lilygo.cc/products/t-lora-pager (ESP32-S3 + SX1262)
extends = esp32_base
board = tlora_pager
lib_deps =
    ${esp32_base.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
    https://github.com/Xinyuan-LilyGO/LilyGoLib.git
    mikalhart/TinyGPSPlus@^1.1.0
    adafruit/Adafruit TCA8418@^1.0.2
board_build.partitions = partitions_16MB.csv
board_build.arduino.upstream_packages = no
board_build.variants_dir = variants
build_flags =
    ${esp32_base.build_flags}
    -DLILYGO_T_LORA_PAGER
    -DARDUINO_T_LORA_PAGER
    -DUSING_RADIO_SX1262
    -DUSING_INPUT_DEV_KEYBOARD
    -DUSING_XL9555_EXPANDS
    -DUSING_AUDIO_CODEC
    -DARDUINO_LILYGO_LORA_SX1262
    -DCORE_DEBUG_LEVEL=4
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts =
    extra_scripts/get_version.py
    pre:extra_scripts/compress_data.py
    pre:extra_scripts/patch_lilygolib.py
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/LILYGO_T_LoraPager/hal_LILYGO_T_LoraPager.cpp>
    +<display/display_LILYGO_T_LoraPager.cpp>

[env:SEEED_SenseCAP_Indicator]  ;https://wiki.seeedstudio.com/SenseCAP_Indicator_Get_Started/ (ESP32-S3R8)
extends = esp32_base
board = esp32-s3-devkitc-1
lib_deps =
    ${esp32_base.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
board_build.partitions = partitions_8MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    ${esp32_base.build_flags}
    -DSEEED_SENSECAP_INDICATOR
    -DCORE_DEBUG_LEVEL=4
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/SEEED_SenseCAP_Indicator/hal_SEEED_SenseCAP_Indicator.cpp>
    +<display/display_SEEED_SenseCAP_Indicator.cpp>

[env:SEEED_XIAO_ESP32S3_Wio_SX1262]  ;https://wiki.seeedstudio.com/wio_sx1262_with_xiao_esp32s3_for_lora/
extends = esp32_base
board = seeed_xiao_esp32s3
board_build.partitions = partitions_8MB.csv
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
build_flags =
    ${esp32_base.build_flags}
    -DSEEED_XIAO_ESP32S3_WIO_SX1262
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/SEEED_XIAO_ESP32S3_Wio_SX1262/hal_SEEED_XIAO_ESP32S3_Wio_SX1262.cpp>

[env:LILYGO_T-ETH-Elite_SX1262]  ;https://lilygo.cc/products/t-eth-elite-esp32-s3 (ESP32-S3 + W5500 ETH + SX1262)
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.partitions = partitions_16MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    ${esp32_base.build_flags}
    -DLILYGO_T_ETH_ELITE_SX1262
    -DHAS_ETHERNET
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/LILYGO_T_ETH_Elite_SX1262/hal_LILYGO_T_ETH_Elite_SX1262.cpp>

; ── nRF52 boards ─────────────────────────────────────────────────────────────

[env:LILYGO_T-Echo]  ;https://lilygo.cc/products/t-echo (nRF52840 + SX1262 + E-Paper 200x200)
platform = nordicnrf52
board = adafruit_feather_nrf52840
lib_deps =
    jgromes/RadioLib@^7.4.0
    bblanchon/ArduinoJson@^7.4.2
    zinggjm/GxEPD2@^1.6.5
board_build.variants_dir = variants
board_build.variant = lilygo_t_echo
build_flags =
    -DPIO_ENV_NAME=\"${PIOENV}\"
    -DLILYGO_T_ECHO
    -DNRF52_PLATFORM
    -Os
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/LILYGO_T_Echo/hal_LILYGO_T_Echo.cpp>
    +<display/display_EPaper_GxEPD2.cpp>
