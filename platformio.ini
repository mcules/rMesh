[env:LILYGO_T-LoraPager]  ;https://lilygo.cc/products/t-lora-pager (ESP32-S3 + SX1262)
; Board-ID "tlora_pager" sets ARDUINO_T_LORA_PAGER, required by LilyGoLib.
; arduino-esp32 >= 3.3.0-alpha1 required (dev-index URL).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = tlora_pager
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
	jgromes/RadioLib@^7.4.0
	esp32async/ESPAsyncWebServer@^3.8.0
	bblanchon/ArduinoJson@^7.4.2
	lovyan03/LovyanGFX@^1.1.16
	; LilyGoLib from GitHub – includes Display, Keyboard and Power-Management API
	https://github.com/Xinyuan-LilyGO/LilyGoLib.git
	; Third-party libs required by LilyGoLib
	mikalhart/TinyGPSPlus@^1.1.0
	adafruit/Adafruit TCA8418@^1.0.2
board_build.filesystem = littlefs
board_build.partitions = partitions_16MB.csv
board_build.arduino.upstream_packages = no
board_build.variants_dir = variants
build_flags =
    -DPIO_ENV_NAME=\"${PIOENV}\"
    -DLILYGO_T_LORA_PAGER
    -DARDUINO_T_LORA_PAGER
    -DUSING_RADIO_SX1262
    -DUSING_INPUT_DEV_KEYBOARD
    -DUSING_XL9555_EXPANDS
    -DUSING_AUDIO_CODEC
    -DARDUINO_LILYGO_LORA_SX1262
    -DCORE_DEBUG_LEVEL=4
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts =
    extra_scripts/get_version.py
    pre:extra_scripts/compress_data.py
    pre:extra_scripts/patch_lilygolib.py

