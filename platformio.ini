; PlatformIO Project Configuration File
;
; Board-specific HAL and display driver selection is controlled via
; build_src_filter.  The BSP layer (src/bsp/) provides board configuration
; at runtime through the IBoardConfig interface.

; ── Shared base ──────────────────────────────────────────────────────────────

[env]
framework = arduino
monitor_speed = 115200
extra_scripts =
    extra_scripts/get_version.py
    pre:extra_scripts/compress_data.py

[esp32_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
upload_speed = 921600
lib_deps =
    jgromes/RadioLib@^7.4.0
    esp32async/ESPAsyncWebServer@^3.8.0
    bblanchon/ArduinoJson@^7.4.2
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
build_flags =
    -DPIO_ENV_NAME=\"${PIOENV}\"
    -DHAS_WIFI
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=ESP_LOG_NONE
    -Os
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp> +<bsp/boards/ESP32_Without_LoRa/hal_ESP32_Without_LoRa.cpp>

; ── ESP32 boards ─────────────────────────────────────────────────────────────

[env:ESP32_Without_LoRa]
extends = esp32_base
board = esp32dev
build_flags =
    ${esp32_base.build_flags}
    -DESP32_WITHOUT_LORA
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/ESP32_Without_LoRa/hal_ESP32_Without_LoRa.cpp>

[env:ESP32_E22_V1]  ;Eigenbauplatine ESP32 mit E22 LoRa-Modul (SX1262), optional SSD1306 OLED
extends = esp32_base
board = esp32dev
lib_deps =
    ${esp32_base.lib_deps}
    olikraus/U8g2@^2.35.30
build_flags =
    ${esp32_base.build_flags}
    -DESP32_E22_V1
    -DHAS_U8G2_DISPLAY
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
build_src_filter = +<*> -<bsp/boards/*/hal_*.cpp> -<display/display_*.cpp>
    +<bsp/boards/ESP32_E22_V1/hal_ESP32_E22_V1.cpp>
    +<display/display_SSD1306_U8g2.cpp>

