        <script>
            var ui = ""   
            var activeChannel = 0;      
			var websocket;
			var timeout = 0;
            var messages = [];
            let okSound = new Audio("ok.wav");
            var channels = [];
            for (let i = 0; i <= 10; i++) {
                channels[i] = {
                    dstCall: ""
                };
            }


			document.addEventListener('DOMContentLoaded', async function() {
                //Init
                setUI("monitor");
                drawClock(new Date(0));
                let okSound = new Audio("ok.wav");

                //Kanaleinstellungen laden
                //Cookie.set("channels", JSON.stringify(channels));
                var json = Cookie.get("channels", JSON.stringify(channels)) ;
                channels = JSON.parse(json);
                channels[1].dstCall = "all";

                //Channel Buttons + Message input
                for (let i = 1; i <= 10; i++) {
                    channels[i].unread = 0;

                    if (i > 2) {
                        document.getElementById("channelButton" + i).addEventListener("dblclick", async function() {
                            var value = await inputBox("Group Name?");
                            channels[i].dstCall = value;
                            Cookie.set("channels", JSON.stringify(channels))
                            showMessages(true);
                        });
                    }

                    document.getElementById('messageText' + i).addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            const pos = this.selectionStart;
                            const text = this.value;
                            const startOfLine = text.lastIndexOf('\n', pos - 1) + 1;
                            let endOfLine = text.indexOf('\n', pos);
                            if (endOfLine === -1) endOfLine = text.length;
                            const currentLineText = text.substring(startOfLine, endOfLine);
                            sendMessage(currentLineText, i,);
                            
                            if (pos < text.length) {
                                e.preventDefault(); 
                                const nextLineIndex = text.indexOf('\n', pos);
                                if (nextLineIndex !== -1) {
                                    this.setSelectionRange(nextLineIndex + 1, nextLineIndex + 1);
                                } else {
                                    this.setSelectionRange(text.length, text.length);
                                }
                            }
                        }
                    });
                }   
                
                setUI("monitor");

                //Websocket verbinden
				initWebSocket();
                
			});

            document.addEventListener("visibilitychange", function() {
                if (!document.hidden) { setUI(ui); }
            });


			document.getElementById("tuneButton").addEventListener("click", function() {
				sendWS(JSON.stringify({tune: true }));
			});   

            document.getElementById("announceButton").addEventListener("click", function() {
				sendWS(JSON.stringify({announce: true }));
			});   

			document.getElementById("settingsReboot").addEventListener("click", function() {
				sendWS(JSON.stringify({reboot: true }));
			});

			document.getElementById("settingsSSIDList").addEventListener("click", function() {
				document.getElementById("settingsSSID").value = document.getElementById("settingsSSIDList").value;
			});

			document.getElementById("settingsApMode").addEventListener("change", function() { settingsVisibility(); });

			document.getElementById("settingsDHCP").addEventListener("change", function() { settingsVisibility(); });            

            document.getElementById("statusSyncTime").addEventListener("click", function() {
				sendWS(JSON.stringify({time: Math.floor(Date.now() / 1000) }));
			});

			document.getElementById("settingsScanWifi").addEventListener("click", function() {
                msgBox("WiFi scan started. Results will be displayed in a few seconds.");
                document.getElementById('settingsSSIDList').innerHTML = "";
				sendWS(JSON.stringify({scanWifi: true }));
			});            

            //F-Tasten
            window.addEventListener('keydown', function(e) {
                if (e.altKey) {
                    const key = e.key.toLowerCase(); // Damit es auch bei festgestellter Großschreibung geht
                    if (key === 'm' ) {e.preventDefault(); setUI("monitor"); }
                    if (key === 'p' ) {e.preventDefault(); setUI("peer"); }
                    if (key === 'a' ) {e.preventDefault(); sendWS(JSON.stringify({announce: true })); }
                }
                // Extrahiert die Zahl nach dem "F"
                const fKeyMatch = e.key.match(/^F(\d+)$/);
                if (fKeyMatch) {
                    const fNumber = parseInt(fKeyMatch[1]);
                    // Nur F1 bis F10 abfangen
                    if (fNumber >= 1 && fNumber <= 10) {
                        e.preventDefault(); // Browser-Standard blockieren
                        setUI("channel" + fNumber);
                    }
                }
            });

            function openDosPopup() {
                // Konfiguration des Popups
                const width = 800;
                const height = 600;
                const left = (screen.width - width) / 2;
                const top = (screen.height - height) / 2;

                // Das "window.open" Kommando mit Parametern für ein minimalistisches Fenster
                window.open(
                    'dos.html', 
                    'DOSEmulator', 
                    `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,resizable=yes`
                );
            } 
            
            
			const Cookie = {
			  get(name, defaultValue = null) {
				const cookies = document.cookie.split(";").map(c => c.trim());
				for (const c of cookies) {
				  const eqIndex = c.indexOf("=");
				  const n = c.substring(0, eqIndex);
				  const v = c.substring(eqIndex + 1);
				  if (n === name) return v;
				}
				return defaultValue;
			  },

			  set(name, value, days = 3650) {
				const expires = new Date(Date.now() + days * 864e5).toUTCString();
				document.cookie = `${name}=${value}; expires=${expires}; path=/`;
			  },

			  delete(name) {
				document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
			  }
			};       
            
            
            function msgBox(title) {
                return new Promise(resolve => {
                    const overlay = document.getElementById("overlay");
                    const input = document.getElementById("modalInput");
                    const titleElem = document.getElementById("modalTitle");
                    const okBtn = document.getElementById("modalOk");
                    titleElem.textContent = title;
                    input.style.display = "none";
                    overlay.style.display = "flex";

                    function onOk() {
                        overlay.style.display = "none";
                        okBtn.removeEventListener("click", onOk);
                    }

                    okBtn.addEventListener("click", onOk);
                });
            }

            
            function inputBox(title, defaultValue = "", returnFocusElement = null) {
                return new Promise(resolve => {
                    const overlay = document.getElementById("overlay");
                    const input = document.getElementById("modalInput");
                    const titleElem = document.getElementById("modalTitle");
                    const okBtn = document.getElementById("modalOk");

                    titleElem.textContent = title;
                    input.value = defaultValue; 
                    input.style.display = "flex";
                    overlay.style.display = "flex";
                    
                    input.focus();
                    if (defaultValue) input.select(); // Markiert Text, falls einer da ist

                    function close() {
                        overlay.style.display = "none";
                        okBtn.removeEventListener("click", onOk);
                        input.removeEventListener("keydown", onKey);
                        
                        // Fokus zurückgeben, falls ein Element übergeben wurde
                        if (returnFocusElement && typeof returnFocusElement.focus === "function") {
                            returnFocusElement.focus();
                        }
                    }

                    function onOk() {
                        const val = input.value;
                        close();
                        resolve(val);
                    }

                    function onKey(e) {
                        if (e.key === "Enter") onOk();
                        if (e.key === "Escape") { close(); resolve(null); }
                    }

                    okBtn.addEventListener("click", onOk);
                    input.addEventListener("keydown", onKey);
                });
            }


        </script>
