<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Megaphone cone (flared, with depth) -->
  <rect x="6"  y="18" width="6" height="12" fill="#222"/>
  <rect x="7"  y="19" width="4" height="10" fill="#555"/>
  <!-- Flare body -->
  <polygon points="12,14 12,34 30,40 30,8" fill="#333"/>
  <polygon points="13,15 13,33 29,38 29,9" fill="#555"/>
  <polygon points="14,16 14,32 28,37 28,10" fill="#444"/>
  <!-- Highlight edge -->
  <line x1="13" y1="15" x2="29" y2="9" stroke="#777" stroke-width="1"/>
  <line x1="12" y1="14" x2="12" y2="34" stroke="#222" stroke-width="1"/>
  <!-- Handle -->
  <rect x="3"  y="20" width="4" height="8" fill="#333"/>
  <rect x="4"  y="21" width="2" height="6" fill="#666"/>
  <!-- Sound waves (arcs) -->
  <path d="M32,16 Q36,12 36,24 Q36,36 32,32" fill="none" stroke="#222" stroke-width="2"/>
  <path d="M33,17 Q35,13 35,24 Q35,35 33,31" fill="none" stroke="#555" stroke-width="1"/>
  <path d="M38,12 Q44,8 44,24 Q44,40 38,36" fill="none" stroke="#222" stroke-width="2"/>
  <path d="M39,13 Q43,9 43,24 Q43,39 39,35" fill="none" stroke="#444" stroke-width="1"/>
  <!-- Small detail dots -->
  <rect x="15" y="22" width="2" height="2" fill="#666"/>
  <rect x="20" y="20" width="2" height="2" fill="#666"/>
  <rect x="25" y="18" width="2" height="2" fill="#666"/>
</svg>
