<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOS</title>
    
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden;
        }
        #dos { width: 100vw; height: 100vh; }
        
        /* Radically hides the js-dos logo and additional UI elements */
        .jd-canvas-container canvas { cursor: default !important; }
    </style>
</head>
<body>

    <div id="dos"></div>

    <script>
        Dos(document.getElementById("dos"), {
            url: "https://v8.js-dos.com/bundles/doom.jsdos", 
            autoStart: true,
            kiosk: true,              // Enables kiosk mode (removes almost all UI elements)
            noSideBar: true,          // Removes the sidebar
            noFooter: true,           // Removes the status bar at the bottom
            noFullscreen: true,       // Hides the fullscreen button
            mouseCapture: false,      // Prevents the mouse from being captured in the window
        });
    </script>
</body>
</html>
