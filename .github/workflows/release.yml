name: Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check-runner:
    runs-on: ubuntu-latest
    outputs:
      online: ${{ steps.check.outputs.online }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_PAT }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '[.runners[] | select(.labels[].name=="ai1") | .status] | first // "offline"' 2>/dev/null || echo "offline")
          echo "Runner status: $STATUS"
          if [ "$STATUS" = "online" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
          fi

  list-envs:
    needs: check-runner
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.list.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: pip install platformio
      - id: list
        run: |
          envs=$(pio project config --json-output \
            | python3 -c "import json,sys; print(json.dumps([s[0].split(':',1)[1] for s in json.load(sys.stdin) if s[0].startswith('env:') and 'T-Echo' not in s[0]]))")
          echo "envs=$envs" >> "$GITHUB_OUTPUT"
          echo "Envs: $envs"

  build:
    needs: [check-runner, list-envs]
    runs-on: ${{ needs.check-runner.outputs.online == 'true' && fromJSON('["self-hosted","linux","ai1","platformio"]') || 'ubuntu-latest' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.list-envs.outputs.envs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/cache@v4
        if: runner.environment == 'github-hosted'
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini', 'extra_scripts/patch_lilygolib.py') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }} -j 6

      - name: Stage firmware artifacts
        run: |
          set -euo pipefail
          mkdir -p staging
          env_dir=".pio/build/${{ matrix.env }}"
          for f in firmware.bin bootloader.bin partitions.bin firmware.hex firmware.uf2; do
            if [ -f "$env_dir/$f" ]; then
              cp "$env_dir/$f" "staging/${{ matrix.env }}_${f}"
            fi
          done

      - name: Build filesystem (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }} --target buildfs -j 6

      - name: Stage filesystem artifacts
        run: |
          set -euo pipefail
          env_dir=".pio/build/${{ matrix.env }}"
          [ -f "$env_dir/littlefs.bin" ] && cp "$env_dir/littlefs.bin" "staging/${{ matrix.env }}_littlefs.bin"
          ls -lh staging/

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.env }}
          path: staging/
          retention-days: 1

  package:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Assemble release directory
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/* release/
          ls -lh release/

      - name: Package per-env ZIPs
        run: |
          set -euo pipefail
          # Discover env names from collected files (firmware.bin marker)
          for f in release/*_firmware.bin; do
            [ -f "$f" ] || continue
            env_name=$(basename "$f" _firmware.bin)
            zip -j "release/${env_name}.zip" release/${env_name}_*.bin
          done
          # nRF52 envs (no firmware.bin, but .hex/.uf2)
          for f in release/*_firmware.hex release/*_firmware.uf2; do
            [ -f "$f" ] || continue
            env_name=$(basename "$f" | sed -E 's/_firmware\.(hex|uf2)$//')
            shopt -s nullglob
            files=(release/${env_name}_*)
            shopt -u nullglob
            [ ${#files[@]} -gt 0 ] && zip -j "release/${env_name}.zip" "${files[@]}"
          done

      - name: Generate esp-web-tools manifests
        run: python extra_scripts/gen_manifests.py "${{ github.ref_name }}" release

      - name: Extract release notes from CHANGELOG.md
        run: python extra_scripts/extract_changelog.py "${{ github.ref_name }}" > release_notes.md

      - name: List release assets
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
